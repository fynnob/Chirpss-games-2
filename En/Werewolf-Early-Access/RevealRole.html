<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #F1F5F9; overflow: hidden; touch-action: none; }
        
        .card-stack { position: relative; width: 300px; height: 420px; margin: 0 auto; user-select: none; perspective: 1000px; }
        
        .role-card { 
            position: absolute; inset: 0; border-radius: 2.5rem; display: flex; flex-direction: column; 
            text-align: center; padding: 2rem; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Front of Card (The Cover) */
        #card-front { 
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: white; z-index: 20; cursor: grab; 
            border: 1px solid rgba(220, 38, 38, 0.3);
            box-shadow: 0 0 40px -15px rgba(220, 38, 38, 0.5), inset 0 0 20px rgba(0,0,0,0.8);
            justify-content: center; align-items: center;
        }
        #card-front:active { cursor: grabbing; }

        /* Back of Card (The Role) */
        #card-back { 
            background: rgba(2, 6, 23, 0.85); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(220, 38, 38, 0.2); 
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9), 0 20px 40px rgba(0,0,0,0.6);
            z-index: 10; 
            justify-content: center; align-items: center;
            padding-bottom: 2rem;
            /* Static position behind front */
        }

        .drag-hint { animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Team Colors */
        .text-wolf { color: #ef4444; }
        .text-villager { color: #4ade80; }
        .text-neutral { color: #e2e8f0; }
    </style>
<meta content="Play ... on CHIRPSS. Fun party games for you and your friends for free online!" name="description"/>
<meta content="party games, online games, multiplayer games, CHIRPSS, social games, browser games, free games" name="keywords"/>

<meta content="summary_large_image" name="twitter:card"/>
<meta content="CHIRPSS | Reveal Role" name="twitter:title"/>
<meta content="Play ... on CHIRPSS. Fun party games for you and your friends for free online!" name="twitter:description"/>

</head>
<body class="min-h-screen flex flex-col relative bg-slate-950">
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-red-900/20 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-red-950/40 rounded-full blur-3xl"></div>
</div>
<chirpss-header></chirpss-header>
<main class="relative z-10 flex-grow flex flex-col items-center justify-center p-4">
<div class="text-center mb-8">
<h2 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-br from-red-600 to-red-300 mb-1 uppercase tracking-wider drop-shadow-[0_0_10px_rgba(185,28,28,0.2)]" id="main-title">Secret Identity</h2>
<p class="text-red-800/80 text-xs font-bold uppercase tracking-widest">Pass device to <span class="text-red-200" id="current-player-name">...</span></p>
</div>
<div class="card-stack mb-8">
<div class="role-card" id="card-back">
<div class="text-6xl mb-4" id="role-icon">❓</div>
<h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">You are a</h2>
<h1 class="text-4xl font-black text-white mb-4 uppercase leading-tight" id="role-name">...</h1>
<p class="text-sm font-medium text-gray-400 leading-relaxed" id="role-desc">...</p>
<div class="mt-6 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest bg-white/5" id="team-badge">...</div>
</div>
<div class="role-card" id="card-front">
<div class="w-20 h-20 bg-black/40 rounded-full flex items-center justify-center mb-6 border border-red-900/40 shadow-[0_0_15px_rgba(220,38,38,0.3)]">
<span class="text-4xl drop-shadow-md">🤫</span>
</div>
<h3 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-br from-red-500 to-red-800 mb-2 drop-shadow-md">TAP &amp; DRAG</h3>
<p class="text-xs font-bold text-red-400/70 uppercase tracking-widest mb-8">Slide up to reveal</p>
<div class="drag-hint text-red-500/50 text-2xl drop-shadow-[0_0_8px_rgba(220,38,38,0.5)]">▲</div>
</div>
</div>
<button class="w-full max-w-xs py-4 bg-gray-900 border border-red-900/30 shadow-[0_0_15px_rgba(220,38,38,0.1)] text-gray-600 font-bold rounded-xl transition-all uppercase tracking-widest text-sm active:scale-95 transition-transform" disabled="" id="next-btn" onclick="confirmAndNext()">
            Slide Up First
        </button>
</main>
<script>
        const CDN_BASE = "../../cdn-chirpss/Werewolf";
        let playersQueue = [];
        let rolesDB = {};
        let currentIndex = 0;
        
        // Drag Logic
        let isDragging = false; 
        let startY = 0; 
        let currentY = 0;
        let isRevealed = false;

        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Load Players
            const payload = sessionStorage.getItem('werewolf_payload');
            if(!payload) return window.location.href = 'index.html';
            playersQueue = JSON.parse(payload);

            // 2. Load Role Data (Descriptions/Icons)
            try {
                const res = await fetch(`${CDN_BASE}/Data/roles.json`);
                const data = await res.json();
                rolesDB = data.roles;
                
                setupRound();
            } catch(e) {
                alert("Error loading role data");
            }

            // 3. Attach Drag Events
            const front = document.getElementById('card-front');
            
            front.addEventListener('mousedown', dragStart);
            window.addEventListener('mousemove', dragMove);
            window.addEventListener('mouseup', dragEnd);
            
            front.addEventListener('touchstart', (e) => dragStart(e.touches[0]));
            window.addEventListener('touchmove', (e) => dragMove(e.touches[0]));
            window.addEventListener('touchend', dragEnd);
        });

        function setupRound() {
            // Reset State
            isRevealed = false;
            currentY = 0;
            const front = document.getElementById('card-front');
            front.style.transition = 'none'; // Snap back instantly
            front.style.transform = 'translateY(0)';
            front.style.opacity = '1';
            
            // Update UI Text
            const player = playersQueue[currentIndex];
            document.getElementById('current-player-name').innerText = player.name;
            
            // Update Back Card Content
            const roleData = rolesDB[player.role];
            
            document.getElementById('role-icon').innerText = roleData.emoji || '🎲';
            document.getElementById('role-name').innerText = roleData.name;
            document.getElementById('role-desc').innerText = roleData.description;

            // Styling based on Team
            const nameEl = document.getElementById('role-name');
            const badgeEl = document.getElementById('team-badge');
            
            nameEl.className = "text-4xl font-black mb-4 uppercase leading-tight"; // reset
            badgeEl.className = "mt-6 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest bg-white/5";

            if(player.team === 'Werewolf') {
                nameEl.classList.add('text-wolf');
                badgeEl.innerText = "Team Evil";
                badgeEl.classList.add('text-wolf');
            } else if(player.team === 'Village') {
                nameEl.classList.add('text-villager');
                badgeEl.innerText = "Team Village";
                badgeEl.classList.add('text-villager');
            } else {
                nameEl.classList.add('text-neutral');
                badgeEl.innerText = "Neutral";
                badgeEl.classList.add('text-neutral');
            }

            // Reset Button
            const btn = document.getElementById('next-btn');
            btn.disabled = true;
            btn.className = "w-full max-w-xs py-4 bg-gray-900 border border-red-900/30 shadow-[0_0_15px_rgba(220,38,38,0.1)] text-gray-600 font-bold rounded-xl transition-all uppercase tracking-widest text-sm cursor-not-allowed";
            btn.innerText = `Slide Up First (${currentIndex + 1}/${playersQueue.length})`;
        }

        // --- DRAG HANDLERS ---
        function dragStart(e) {
            isDragging = true;
            startY = e.clientY;
            document.getElementById('card-front').style.transition = 'none';
        }

        function dragMove(e) {
            if(!isDragging) return;
            const y = e.clientY;
            const delta = y - startY;
            
            // Only allow dragging UP (negative delta)
            currentY = Math.min(0, Math.max(-400, delta));
            
            const front = document.getElementById('card-front');
            front.style.transform = `translateY(${currentY}px)`;
            
            // Fade out slightly as you drag up
            const opacity = 1 - (Math.abs(currentY) / 300);
            front.style.opacity = Math.max(0, opacity);
        }

        function dragEnd() {
            if(!isDragging) return;
            isDragging = false;
            
            const front = document.getElementById('card-front');
            front.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease';

            // Threshold to reveal (-150px)
            if(currentY < -150) {
                // Success: Slide completely out of view
                front.style.transform = 'translateY(-600px)';
                front.style.opacity = '0';
                isRevealed = true;
                enableButton();
            } else {
                // Fail: Snap back
                front.style.transform = 'translateY(0)';
                front.style.opacity = '1';
            }
        }

        function enableButton() {
            const btn = document.getElementById('next-btn');
            btn.disabled = false;
            const isLast = currentIndex >= playersQueue.length - 1;
            
            btn.className = "w-full max-w-xs py-4 bg-gradient-to-r from-red-900 to-red-600 text-white font-black rounded-xl shadow-[0_0_20px_rgba(220,38,38,0.4)] border border-red-500/30  transition-all uppercase tracking-widest text-sm";
            btn.innerText = isLast ? "START GAME" : "CONFIRM & HIDE";
        }

        function confirmAndNext() {
            if(!isRevealed) return;

            if(currentIndex >= playersQueue.length - 1) {
                window.location.href = 'Game.html';
            } else {
                currentIndex++;
                setupRound();
            }
        }

    </script>
</body>
</html>
