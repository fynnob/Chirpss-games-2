<!DOCTYPE html>

<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CHIRPSS | Imposter Game</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&amp;display=swap" rel="stylesheet"/>
<link href="https://gc.fynn.qzz.io/icon_2.png" rel="icon" type="image/png"/>
<script src="https://cdn.tailwindcss.com"></script>
<script defer="" src="https://cdn.fynn.qzz.io/layout.js"></script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #F1F5F9; overflow: hidden; }
        .timer-val { font-size: 8rem; font-weight: 900; line-height: 1; letter-spacing: -0.05em; }
        .blob-bg { position: fixed; border-radius: 50%; mix-blend-mode: screen; filter: blur(60px); opacity: 0.3; pointer-events: none; z-index: 0; }
        
        /* Modal Animation */
        #confirm-modal { transition: opacity 0.3s ease, visibility 0.3s; }
        #confirm-modal.hidden { opacity: 0; visibility: hidden; display: flex; }
    </style>
<meta content="Play free social deduplication and party games with your friends online on CHIRPSS!" name="description"/>
<meta content="party games, online games, multiplayer games, CHIRPSS, social games, browser games, free games" name="keywords"/>
<meta content="CHIRPSS | Imposter Game" property="og:title"/>
<meta content="Play free social deduplication and party games with your friends online on CHIRPSS!" property="og:description"/>
<meta content="website" property="og:type"/>
<meta content="https://gc.fynn.qzz.io/En/Imposter/Game.html" property="og:url"/>
<meta content="summary_large_image" name="twitter:card"/>
<meta content="CHIRPSS | Imposter Game" name="twitter:title"/>
<meta content="Play free social deduplication and party games with your friends online on CHIRPSS!" name="twitter:description"/>
<link href="https://gc.fynn.qzz.io/En/Imposter/Game.html" rel="canonical"/>
</head>
<body class="min-h-screen flex flex-col relative bg-deep-twilight">
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0" id="blob-container">
<div class="blob-bg bg-warm-dusk/20 w-96 h-96 top-0 left-1/4 animate-drift" id="blob-1"></div>
<div class="blob-bg bg-purple-500/20 w-80 h-80 top-40 right-1/4 animate-drift" id="blob-2"></div>
</div>
<div class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-deep-twilight/80 backdrop-blur-md" id="confirm-modal">
<div class="bg-card-bg border border-white/10 p-8 rounded-3xl max-w-sm w-full shadow-2xl text-center scale-95 animate-in fade-in zoom-in duration-300">
<h3 class="text-2xl font-black mb-2">End Round?</h3>
<p class="text-subtle-gray text-sm mb-8">Are you sure you want to stop the timer and start the voting process?</p>
<div class="flex gap-3">
<button class="flex-1 py-3 bg-white/5 border border-white/10 rounded-xl font-bold" onclick="closeModal()">Cancel</button>
<button class="flex-1 py-3 bg-red-600 text-white rounded-xl font-bold shadow-lg shadow-red-600/20" onclick="confirmEndRound()">End Now</button>
</div>
</div>
</div>
<chirpss-header></chirpss-header>
<main class="relative z-10 flex-grow flex flex-col items-center justify-center p-4">
<div class="text-center" id="timer-state">
<div class="bg-warm-dusk/20 border border-warm-dusk/30 px-6 py-2 rounded-full mb-8 inline-block" id="start-player-box">
<p class="text-warm-dusk font-bold text-sm uppercase tracking-widest" id="start-player-announcement"></p>
</div>
<h2 class="text-sm font-bold text-subtle-gray uppercase tracking-widest mb-4" id="timer-heading">Discussion Round</h2>
<div class="timer-val text-white mb-12" id="timer">05:00</div>
<div class="flex gap-4">
<button class="px-10 py-4 bg-white/5 border border-white/10 rounded-2xl font-bold hover:bg-white/10 transition-all" id="pause-button" onclick="toggleTimer()">PAUSE</button>
<button class="px-10 py-4 bg-red-600 rounded-2xl font-bold text-white shadow-lg hover:scale-105 active:scale-95 transition-all" onclick="openModal()">END ROUND</button>
</div>
</div>
<div class="hidden text-center max-w-sm w-full bg-card-bg/60 border border-white/10 p-8 rounded-3xl backdrop-blur-xl" id="results-state">
<h2 class="text-4xl font-black mb-6" id="results-heading">TIME'S UP</h2>
<p class="text-subtle-gray text-sm mb-8">Discuss one final time and vote for the imposter.</p>
<button class="w-full py-4 bg-gradient-to-r from-warm-dusk to-fiery-core rounded-2xl font-black text-white text-xl" id="reveal-button" onclick="revealImposter()">REVEAL IMPOSTER</button>
<div class="hidden mt-8 space-y-4" id="imposter-details">
<div class="p-6 bg-red-600/20 border border-red-600/30 rounded-2xl">
<p class="text-xs font-bold text-red-500 uppercase mb-1">The Imposter</p>
<p class="text-3xl font-black text-white" id="imposter-name"></p>
</div>
<div class="p-6 bg-white/5 border border-white/10 rounded-2xl">
<p class="text-xs font-bold text-subtle-gray uppercase mb-1">Secret Word</p>
<p class="text-2xl font-black text-fiery-core" id="secret-word"></p>
</div>
<button class="w-full py-4 bg-white text-black font-bold rounded-2xl mt-4" onclick="location.href='./index.html'">PLAY AGAIN</button>
</div>
</div>
</main>
<script>
        let data = JSON.parse(sessionStorage.getItem('chirpss_imposter_game_data'));
        let roles = JSON.parse(sessionStorage.getItem('chirpss_imposter_assigned_roles'));
        let timeRemaining = data.gameTimeSeconds;
        let timerInterval;
        let isPaused = false;

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(timeRemaining <= 0) { clearInterval(timerInterval); handleTimeUp(); return; }
                timeRemaining--;
                const min = Math.floor(timeRemaining/60);
                const sec = timeRemaining % 60;
                document.getElementById('timer').textContent = `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
            }, 1000);
        }

        function toggleTimer() {
            isPaused = !isPaused;
            if(isPaused) { clearInterval(timerInterval); document.getElementById('pause-button').textContent = 'RESUME'; }
            else { startTimer(); document.getElementById('pause-button').textContent = 'PAUSE'; }
        }

        // --- MODAL LOGIC ---
        function openModal() { document.getElementById('confirm-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('confirm-modal').classList.add('hidden'); }
        function confirmEndRound() { closeModal(); handleTimeUp(); }

        function handleTimeUp() {
            document.getElementById('timer-state').classList.add('hidden');
            document.getElementById('results-state').classList.remove('hidden');
        }

        function revealImposter() {
            document.getElementById('reveal-button').classList.add('hidden');
            document.getElementById('imposter-details').classList.remove('hidden');
            const imps = Object.keys(roles).filter(k => roles[k].isImp);
            document.getElementById('imposter-name').textContent = imps.join(' & ');
            document.getElementById('secret-word').textContent = roles[imps[0]].word;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const players = Object.keys(roles);
            document.getElementById('start-player-announcement').textContent = `${players[Math.floor(Math.random()*players.length)]} Starts!`;
            startTimer();
        });
    </script>
</body>
</html>
