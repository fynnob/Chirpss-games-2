<!DOCTYPE html>

<html class="scroll-smooth" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CHIRPSS | Short Fuse - Setup</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://chirpss.github.io/icon_2.png" rel="icon" type="image/png"/>
<link href="https://gc.fynn.qzz.io/icon_2.png" rel="icon" type="image/png"/>
<script defer="" src="https://cdn.fynn.qzz.io/layout.js"></script>
<script defer="" src="https://cdn.fynn.qzz.io/cookies.js"></script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #F1F5F9; overflow-x: hidden; }
        .blob-bg { position: fixed; border-radius: 50%; mix-blend-mode: screen; filter: blur(60px); opacity: 0.3; pointer-events: none; transition: transform 0.1s linear; z-index: 0; }
        
        input[type=range]::-webkit-slider-runnable-track { background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #ef4444; margin-top: -6px; cursor: pointer; border: 2px solid white; }
    </style>
<meta content="Play free social deduplication and party games with your friends online on CHIRPSS!" name="description"/>
<meta content="party games, online games, multiplayer games, CHIRPSS, social games, browser games, free games" name="keywords"/>
<meta content="CHIRPSS | Short Fuse - Setup" property="og:title"/>
<meta content="Play free social deduplication and party games with your friends online on CHIRPSS!" property="og:description"/>
<meta content="website" property="og:type"/>
<meta content="https://gc.fynn.qzz.io/En/ShortFuse/" property="og:url"/>
<meta content="summary_large_image" name="twitter:card"/>
<meta content="CHIRPSS | Short Fuse - Setup" name="twitter:title"/>
<meta content="Play free social deduplication and party games with your friends online on CHIRPSS!" name="twitter:description"/>
<link href="https://gc.fynn.qzz.io/En/ShortFuse/" rel="canonical"/>
</head>
<body class="min-h-screen flex flex-col relative bg-slate-950">
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0" id="blob-container">
<div class="blob-bg bg-red-600/20 w-96 h-96 top-0 left-1/4 animate-drift" id="blob-1"></div>
<div class="blob-bg bg-orange-600/20 w-80 h-80 top-40 right-1/4 animate-drift" id="blob-2"></div>
</div>
<chirpss-header></chirpss-header>
<main class="relative z-10 max-w-2xl mx-auto p-4 sm:p-8 flex-grow w-full">
<div class="text-center mb-8 animate-fade-in-up">
<h2 class="text-5xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500 uppercase">Short Fuse</h2>
<p class="text-red-200/60 text-sm mt-2 font-bold uppercase tracking-widest">Pass the bomb before time runs out.</p>
</div>
<div class="bg-slate-900/80 border border-red-500/20 rounded-2xl p-6 sm:p-8 shadow-2xl backdrop-blur-md relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-red-600 to-orange-600"></div>
<form class="space-y-8" id="wao-settings-form">
<div>
<label class="block text-sm font-bold text-red-500 uppercase tracking-widest mb-3">Add Players</label>
<div class="flex gap-2 mb-4">
<input class="flex-grow bg-white/5 border border-white/10 rounded-xl p-3 focus:outline-none focus:border-red-500 text-white" id="player-input" placeholder="Name" type="text"/>
<button class="bg-red-600 text-white px-6 rounded-xl font-bold hover:bg-red-500 active:scale-95 transition-all" onclick="addPlayer()" type="button">Add</button>
</div>
<div class="flex flex-wrap gap-2 min-h-[40px]" id="player-list"></div>
<p class="text-[10px] text-subtle-gray mt-2 font-bold uppercase tracking-widest" id="player-count-display">Players: 0 (Min 2)</p>
</div>
<div>
<label class="block text-xs font-bold text-subtle-gray mb-2 uppercase tracking-widest">Fuse Length (Seconds): <span class="text-orange-400" id="question-time-display">10s</span></label>
<input class="w-full h-2 appearance-none cursor-pointer bg-transparent" id="question-time-slider" max="30" min="5" step="5" type="range" value="10"/>
</div>
<div>
<label class="block text-sm font-bold text-red-500 uppercase tracking-widest mb-4">Bomb Packs</label>
<div class="flex flex-wrap gap-2" id="categories-container"></div>
</div>
<button class="w-full py-4 bg-gray-600 text-white font-extrabold text-xl rounded-xl shadow-lg transition-all" disabled="" id="start-game-btn" type="submit">ARM THE BOMB</button>
</form>
</div>
</main>
<chirpss-footer></chirpss-footer>
<script>
        // Updated Data Source
        const CATEGORY_URL = 'https://cdn.fynn.qzz.io/ShortFuse/data.json';
        
        let state = JSON.parse(localStorage.getItem('chirpss_shortfuse_state')) || {
            players: [],
            timeLimit: 10,
            selectedCats: []
        };

        function saveState() {
            localStorage.setItem('chirpss_shortfuse_state', JSON.stringify(state));
            updateUI();
        }

        function updateUI() {
            const isReady = state.players.length >= 2 && state.selectedCats.length > 0;
            const btn = document.getElementById('start-game-btn');
            btn.disabled = !isReady;
            btn.className = isReady 
                ? "w-full py-4 bg-gradient-to-r from-red-600 to-orange-600 text-white font-extrabold text-xl rounded-xl shadow-[0_0_20px_rgba(239,68,68,0.4)] hover:scale-[1.02] active:scale-95 transition-all uppercase italic tracking-wider" 
                : "w-full py-4 bg-gray-800 text-gray-500 font-extrabold text-xl rounded-xl cursor-not-allowed uppercase italic tracking-wider";
            
            document.getElementById('player-count-display').textContent = `PLAYERS: ${state.players.length} (MIN 2)`;
            document.getElementById('question-time-display').textContent = `${state.timeLimit}s`;
            renderPlayers();
        }

        function renderPlayers() {
            document.getElementById('player-list').innerHTML = state.players.map(p => `
                <div class="bg-white/5 border border-white/10 px-3 py-1.5 rounded-xl text-sm font-bold flex items-center gap-2">
                    ${p} <button type="button" onclick="removePlayer('${p}')" class="text-red-500 hover:text-white">×</button>
                </div>`).join('');
        }

        function addPlayer() {
            const input = document.getElementById('player-input');
            const name = input.value.trim();
            if(name && !state.players.includes(name)) {
                state.players.push(name);
                input.value = '';
                saveState();
            }
        }

        function removePlayer(name) {
            state.players = state.players.filter(p => p !== name);
            saveState();
        }

        async function fetchCats() {
            const container = document.getElementById('categories-container');
            container.innerHTML = `<p class="text-xs animate-pulse text-red-400">Loading detonators...</p>`;
            try {
                const res = await fetch(CATEGORY_URL);
                const data = await res.json();
                // Short Fuse data structure is { categories: [ {name, items} ] }
                window.all_categories = data.categories; 
                
                container.innerHTML = data.categories.map(cat => {
                    const active = state.selectedCats.includes(cat.name);
                    return `<button type="button" onclick="toggleCat('${cat.name}', this)" class="px-3 py-2 rounded-lg border ${active ? 'border-red-500 bg-red-600 text-white shadow-[0_0_10px_rgba(239,68,68,0.4)]' : 'border-white/10 bg-white/5 text-gray-400'} text-xs font-bold transition-all uppercase tracking-wide">${cat.name}</button>`;
                }).join('');
            } catch(e) { container.innerHTML = `<p class="text-red-500 text-xs">Failed to load packs.</p>`; }
        }

        function toggleCat(name, btn) {
            if(state.selectedCats.includes(name)) state.selectedCats = state.selectedCats.filter(c => c !== name);
            else state.selectedCats.push(name);
            saveState();
            
            // Re-render button style immediately
            btn.className = state.selectedCats.includes(name) 
                ? "px-3 py-2 rounded-lg border border-red-500 bg-red-600 text-white shadow-[0_0_10px_rgba(239,68,68,0.4)] text-xs font-bold transition-all uppercase tracking-wide" 
                : "px-3 py-2 rounded-lg border border-white/10 bg-white/5 text-gray-400 text-xs font-bold transition-all uppercase tracking-wide";
        }

        document.getElementById('question-time-slider').addEventListener('input', (e) => {
            state.timeLimit = e.target.value;
            saveState();
        });

        document.getElementById('player-input').addEventListener('keydown', (e) => { if(e.key === 'Enter') { e.preventDefault(); addPlayer(); }});

        document.getElementById('wao-settings-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Flatten items from selected categories
            const prompts = window.all_categories
                .filter(c => state.selectedCats.includes(c.name))
                .flatMap(c => c.items);
                
            sessionStorage.setItem('shortfuse_game_data', JSON.stringify({
                players: state.players,
                timePerQuestion: state.timeLimit,
                prompts: prompts
            }));
            window.location.href = './Game.html';
        });

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('question-time-slider').value = state.timeLimit;
            updateUI(); fetchCats();
        });
    </script>
</body>
</html>
